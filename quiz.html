<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 - Ezequiel Videla - Quiz</title>

    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <h1>WDD 130 - Ezequiel Videla - Quiz</h1>

    <form action="#">
        <label for="q1">What is an HTML tag?</label>
        <input type="text" name="q1" id="q1">

        <label for="q2"> Describe the purpose of CSS in web development:</label>
        <textarea name="q2" id="q2"></textarea>

        <label for="q3">Which HTML element is used to define a hyperlink?</label>
        <select name="q3" id="q3">
            <option value="" selected disabled>Choose One ...</option>
            <option value="1">a</option>
            <option value="2">link</option>
            <option value="3">href</option>
            <option value="4">nav</option>
        </select>

        <label for="q4">How many HTML elements can you name?</label>
        <input type="number" name="q4" id="q4">

        <button type="submit">Submit Quiz</button>
    </form>

</body>
</html>
